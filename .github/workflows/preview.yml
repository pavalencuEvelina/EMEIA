name: Expo PR Preview

on:
  pull_request:
    types: [opened, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node 24 now

jobs:
  preview:
    name: Build & Post Preview QR
    runs-on: ubuntu-latest
    permissions:
      contents: read         # needed to checkout private repo
      pull-requests: write   # needed to post the QR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ''           # disable npm cache — cache service is broken on this runner

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        uses: expo/expo-github-action/preview@v8
        with:
          command: eas update --auto --branch pr-${{ github.event.pull_request.number }}
          comment: true
          working-directory: .
